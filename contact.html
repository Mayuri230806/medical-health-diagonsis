<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.container{
    width:700px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    padding:35px;
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.row{
    display:flex;
    gap:15px;
}

.col{
    flex:1;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:600;
    color:#333;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus,
textarea:focus{
    border-color:#4facfe;
}

textarea{
    resize:none;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2196F3;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0b7dda;
}

.info{
    margin-top:30px;
    background:#f5f9ff;
    padding:20px;
    border-radius:10px;
}

.info h3{
    margin-bottom:15px;
    color:#333;
}

.info p{
    text-align:left;
    margin:8px 0;
    color:#555;
}

.back{
    text-align:center;
    margin-top:20px;
}

.back a{
    text-decoration:none;
    color:#2196F3;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Contact Us</h1>
<p>We'd love to hear from you. Fill out the form below.</p>

<form action="/contact" method="POST">

<div class="row">
<div class="col">
<label>Full Name</label>
<input type="text" name="name" placeholder="Enter your name" required>
</div>

<div class="col">
<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>
</div>

<div class="row">
<div class="col">
<label>Phone Number</label>
<input type="tel" name="phone" placeholder="+91 9876543210" required>
</div>

<div class="col">
<label>Subject</label>
<input type="text" name="subject" placeholder="Subject" required>
</div>
</div>

<label>Address</label>
<input type="text" name="address" placeholder="House No., Street, Area">

<div class="row">
<div class="col">
<label>City</label>
<input type="text" name="city" placeholder="City">
</div>

<div class="col">
<label>State</label>
<input type="text" name="state" placeholder="State">
</div>
</div>

<div class="row">
<div class="col">
<label>Country</label>
<input type="text" name="country" placeholder="Country">
</div>

<div class="col">
<label>Postal Code</label>
<input type="text" name="pincode" placeholder="Postal Code">
</div>
</div>

<label>Additional Details / Message</label>
<textarea name="message" rows="5" placeholder="Write your message here..."></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">
<h3>Our Contact Information</h3>

<p><strong>📍 Address:</strong> krishna Healthcare Center, Jaipur, Rajasthan, India</p>

<p><strong>📞 Phone:</strong> +91 98765 43210</p>

<p><strong>📧 Email:</strong> support@healthdiagnosis.com</p>

<p><strong>🏙 City:</strong> Jaipur</p>

<p><strong>🗺 State:</strong> Rajasthan</p>

<p><strong>🌍 Country:</strong> India</p>

</div>

<div class="back">
<a href="/">← Back to Home</a>
</div>

</div>

</body>
</html>
